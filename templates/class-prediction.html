{% extends 'base.html' %}
{% block title %}Class Result Prediction{% endblock title %}
{% block body %}
<div class="container mt-5">
    <h1 class="display-4 fw-bold">Get prediction for 4th Semester of the class</h1>
    <p class="lead mb-4">Please select the three required CSV files containing your data.</p>
    <form action="{{ url_for('class_prediction')}}" method="post" enctype="multipart/form-data">
        <div class="row g-3 mb-3">
            <div class="col-md-12">
                <label for="sem1" class="form-label">Sem 1 Data:</label>
                <input type="file" class="form-control" id="sem1" name="sem1" accept=".csv" required>
            </div>
            <div class="col-md-12">
                <label for="sem2" class="form-label">Sem 2 Data:</label>
                <input type="file" class="form-control" id="sem2" name="sem2" accept=".csv" required>
            </div>
            <div class="col-md-12">
                <label for="sem3" class="form-label">Sem 3 Data:</label>
                <input type="file" class="form-control" id="sem3" name="sem3" accept=".csv" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100">Get Prediction</button>
    </form>
</div>

<script>
    // JavaScript to handle form submission
    document.getElementById('csvForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // Add your code to handle the form submission here
      alert('Form submitted!');
    });
  </script>
{% endblock body %}
